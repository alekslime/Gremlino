<!DOCTYPE html>
<html>
<head>

    <title>Gremlino</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

<div class="app">

    <main class="chat-container">

        <div id="welcome">

            <h1>👹 Gremlino</h1>

            <p>
                A tiny gremlin living inside your machine.
            </p>

        </div>

        <div
            id="messages"
            class="messages"
        ></div>

        <div class="input-wrapper">

            <textarea
                id="prompt"
                placeholder="Message Gremlino..."
            ></textarea>

            <button onclick="sendMessage()">
                ➜
            </button>

        </div>

    </main>

</div>

<script src="js/chat.js"></script>

</body>
</html>
